<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 520" role="img" aria-labelledby="nick-title">
  <title id="nick-title">Nick — Guardian Cleaners team member</title>
  <defs>
    <!-- Skin gradient for natural look -->
    <linearGradient id="skinGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5C9A8"/>
      <stop offset="100%" stop-color="#E8B898"/>
    </linearGradient>
    <!-- Hair gradient -->
    <linearGradient id="hairGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#4A3728"/>
      <stop offset="100%" stop-color="#3A2A1E"/>
    </linearGradient>
    <!-- Shirt gradient -->
    <linearGradient id="shirtGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E56B6F"/>
      <stop offset="100%" stop-color="#D15A5E"/>
    </linearGradient>
    <!-- Shirt shadow -->
    <linearGradient id="shirtShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C94E52"/>
      <stop offset="100%" stop-color="#B84448"/>
    </linearGradient>
    <!-- Subtle shadow filter -->
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- ===== BODY / SHIRT ===== -->
  <!-- Torso -->
  <path d="M140 280 C140 260, 155 240, 200 235 C245 240, 260 260, 260 280 L270 420 C270 435, 258 445, 200 445 C142 445, 130 435, 130 420 Z"
        fill="url(#shirtGrad)" filter="url(#softShadow)"/>
  
  <!-- Collar V-neck -->
  <path d="M175 245 L200 275 L225 245" fill="none" stroke="#C94E52" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Collar points -->
  <path d="M172 240 L180 248 L175 255 C178 250, 180 247, 172 240Z" fill="#D15A5E"/>
  <path d="M228 240 L220 248 L225 255 C222 250, 220 247, 228 240Z" fill="#D15A5E"/>

  <!-- Shirt wrinkle lines (subtle) -->
  <path d="M170 320 Q185 325 180 345" fill="none" stroke="#C94E52" stroke-width="1" opacity="0.3"/>
  <path d="M230 320 Q215 325 220 345" fill="none" stroke="#C94E52" stroke-width="1" opacity="0.3"/>
  
  <!-- "Guardian Cleaners" text on shirt -->
  <text x="200" y="350" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="bold" letter-spacing="0.5" opacity="0.95">Guardian</text>
  <text x="200" y="367" text-anchor="middle" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="600" letter-spacing="1" opacity="0.9">CLEANERS</text>

  <!-- ===== CROSSED ARMS ===== -->
  <!-- Left arm (crosses in front, right to left) -->
  <path d="M140 275 C125 285, 118 310, 130 335 C138 350, 170 370, 215 365 C230 363, 240 355, 245 345"
        fill="url(#shirtGrad)" stroke="#C94E52" stroke-width="1" opacity="0.95"/>
  <!-- Left arm shadow fold -->
  <path d="M135 310 C150 325, 180 345, 215 340"
        fill="none" stroke="#B84448" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>

  <!-- Right arm (crosses in front, left to right) -->
  <path d="M260 275 C275 285, 282 310, 270 335 C262 350, 230 370, 185 365 C170 363, 160 355, 155 345"
        fill="url(#shirtGrad)" stroke="#C94E52" stroke-width="1" opacity="0.95"/>
  <!-- Right arm shadow fold -->
  <path d="M265 310 C250 325, 220 345, 185 340"
        fill="none" stroke="#B84448" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  
  <!-- Hands (visible at the cross point) -->
  <!-- Left hand peeking out on right side -->
  <path d="M238 348 C244 340, 252 338, 255 342 C258 346, 254 354, 248 356 C242 358, 236 354, 238 348Z"
        fill="url(#skinGrad)"/>
  <!-- Right hand peeking out on left side -->
  <path d="M162 348 C156 340, 148 338, 145 342 C142 346, 146 354, 152 356 C158 358, 164 354, 162 348Z"
        fill="url(#skinGrad)"/>

  <!-- ===== NECK ===== -->
  <rect x="185" y="210" width="30" height="35" rx="8" fill="url(#skinGrad)"/>

  <!-- ===== HEAD ===== -->
  <!-- Face shape -->
  <ellipse cx="200" cy="170" rx="62" ry="72" fill="url(#skinGrad)"/>
  
  <!-- ===== HAIR ===== -->
  <!-- Main hair volume -->
  <path d="M138 155 C135 120, 145 85, 200 80 C255 85, 265 120, 262 155 C262 140, 255 110, 200 105 C145 110, 138 140, 138 155Z"
        fill="url(#hairGrad)"/>
  <!-- Side hair left -->
  <path d="M138 155 C136 145, 137 125, 148 115 C142 130, 139 142, 140 155Z"
        fill="#3A2A1E"/>
  <!-- Side hair right -->
  <path d="M262 155 C264 145, 263 125, 252 115 C258 130, 261 142, 260 155Z"
        fill="#3A2A1E"/>
  <!-- Hair detail/texture -->
  <path d="M160 100 C175 92, 210 88, 240 100" fill="none" stroke="#3A2A1E" stroke-width="3" opacity="0.3"/>
  <path d="M155 108 C175 98, 215 95, 245 105" fill="none" stroke="#4A3728" stroke-width="2" opacity="0.2"/>

  <!-- ===== EARS ===== -->
  <ellipse cx="138" cy="175" rx="10" ry="14" fill="url(#skinGrad)"/>
  <ellipse cx="138" cy="175" rx="6" ry="9" fill="#E0A888" opacity="0.4"/>
  <ellipse cx="262" cy="175" rx="10" ry="14" fill="url(#skinGrad)"/>
  <ellipse cx="262" cy="175" rx="6" ry="9" fill="#E0A888" opacity="0.4"/>

  <!-- ===== EYEBROWS ===== -->
  <path d="M163 148 C170 143, 182 143, 190 147" fill="none" stroke="#3A2A1E" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M210 147 C218 143, 230 143, 237 148" fill="none" stroke="#3A2A1E" stroke-width="2.5" stroke-linecap="round"/>

  <!-- ===== EYES ===== -->
  <!-- Left eye white -->
  <ellipse cx="177" cy="162" rx="13" ry="10" fill="white"/>
  <!-- Left iris -->
  <circle cx="179" cy="162" r="6.5" fill="#5B4A3F"/>
  <!-- Left pupil -->
  <circle cx="180" cy="161" r="3" fill="#2C1E15"/>
  <!-- Left eye highlight -->
  <circle cx="182" cy="159" r="2" fill="white" opacity="0.9"/>
  
  <!-- Right eye white -->
  <ellipse cx="223" cy="162" rx="13" ry="10" fill="white"/>
  <!-- Right iris -->
  <circle cx="221" cy="162" r="6.5" fill="#5B4A3F"/>
  <!-- Right pupil -->
  <circle cx="220" cy="161" r="3" fill="#2C1E15"/>
  <!-- Right eye highlight -->
  <circle cx="222" cy="159" r="2" fill="white" opacity="0.9"/>

  <!-- ===== NOSE ===== -->
  <path d="M197 172 C195 180, 197 188, 200 190 C203 188, 205 180, 203 172"
        fill="none" stroke="#D4A088" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- Nostril hints -->
  <circle cx="195" cy="189" r="2" fill="#D4A088" opacity="0.3"/>
  <circle cx="205" cy="189" r="2" fill="#D4A088" opacity="0.3"/>

  <!-- ===== SMILE ===== -->
  <!-- Mouth -->
  <path d="M180 202 C185 215, 200 222, 220 202"
        fill="none" stroke="#C96B5A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Teeth hint (subtle white arc) -->
  <path d="M185 204 C190 212, 205 216, 215 204"
        fill="white" opacity="0.7"/>
  <!-- Lower lip -->
  <path d="M185 207 C195 218, 210 218, 215 207"
        fill="#E09888" opacity="0.35"/>
  
  <!-- Smile lines / dimples -->
  <path d="M175 200 C173 204, 174 208, 176 210" fill="none" stroke="#D4A088" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
  <path d="M225 200 C227 204, 226 208, 224 210" fill="none" stroke="#D4A088" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

  <!-- ===== CHEEK BLUSH ===== -->
  <ellipse cx="157" cy="192" rx="14" ry="8" fill="#E56B6F" opacity="0.12"/>
  <ellipse cx="243" cy="192" rx="14" ry="8" fill="#E56B6F" opacity="0.12"/>
</svg>