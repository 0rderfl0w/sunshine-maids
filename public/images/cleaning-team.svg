<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-labelledby="team-title">
  <title id="team-title">Guardian Cleaners cleaning crew team</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5F5"/>
      <stop offset="100%" stop-color="#FEE8E8"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="24" fill="url(#bg)"/>

  <!-- ===== PERSON 1 (left, shorter, female) ===== -->
  <g transform="translate(150, 100)">
    <!-- Legs -->
    <rect x="12" y="195" width="20" height="70" rx="8" fill="#4A5568"/>
    <rect x="42" y="195" width="20" height="70" rx="8" fill="#4A5568"/>
    <!-- Shoes -->
    <ellipse cx="22" cy="265" rx="14" ry="6" fill="#2D3748"/>
    <ellipse cx="52" cy="265" rx="14" ry="6" fill="#2D3748"/>
    <!-- Body / Polo shirt -->
    <path d="M10 120 C10 105, 20 95, 37 92 C54 95, 64 105, 64 120 L67 200 C67 205, 60 208, 37 208 C14 208, 7 205, 7 200 Z" fill="#E56B6F"/>
    <!-- Collar -->
    <path d="M25 97 L37 108 L49 97" fill="none" stroke="#D15A5E" stroke-width="2" stroke-linecap="round"/>
    <!-- Arms -->
    <path d="M10 115 C-5 130, -8 160, 2 175" fill="none" stroke="#E56B6F" stroke-width="18" stroke-linecap="round"/>
    <path d="M64 115 C79 130, 82 160, 72 175" fill="none" stroke="#E56B6F" stroke-width="18" stroke-linecap="round"/>
    <!-- Hands -->
    <circle cx="2" cy="178" r="9" fill="#D4A88C"/>
    <circle cx="72" cy="178" r="9" fill="#D4A88C"/>
    <!-- Spray bottle in right hand -->
    <rect x="65" y="155" width="8" height="20" rx="2" fill="#63B3ED"/>
    <rect x="63" y="150" width="12" height="8" rx="2" fill="#4299E1"/>
    <line x1="73" y1="152" x2="80" y2="145" stroke="#90CDF4" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Neck -->
    <rect x="29" y="78" width="16" height="18" rx="6" fill="#D4A88C"/>
    <!-- Head -->
    <ellipse cx="37" cy="58" rx="28" ry="30" fill="#D4A88C"/>
    <!-- Hair (ponytail style) -->
    <path d="M9 48 C8 25, 20 12, 37 10 C54 12, 66 25, 65 48 C65 35, 55 22, 37 20 C19 22, 9 35, 9 48Z" fill="#5B3A29"/>
    <path d="M55 30 C62 35, 68 50, 65 70 C63 60, 58 45, 55 38Z" fill="#5B3A29"/>
    <!-- Ponytail -->
    <path d="M60 40 C75 45, 78 65, 70 80" fill="none" stroke="#5B3A29" stroke-width="10" stroke-linecap="round"/>
    <!-- Eyes (simple dots) -->
    <circle cx="28" cy="56" r="3" fill="#2D3748"/>
    <circle cx="46" cy="56" r="3" fill="#2D3748"/>
    <!-- Eye highlights -->
    <circle cx="29" cy="55" r="1.2" fill="white"/>
    <circle cx="47" cy="55" r="1.2" fill="white"/>
    <!-- Smile -->
    <path d="M30 68 C33 74, 41 74, 44 68" fill="none" stroke="#C05A5A" stroke-width="2" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="22" cy="66" rx="6" ry="3" fill="#E56B6F" opacity="0.2"/>
    <ellipse cx="52" cy="66" rx="6" ry="3" fill="#E56B6F" opacity="0.2"/>
  </g>

  <!-- ===== PERSON 2 (center, tallest, male — Nick) ===== -->
  <g transform="translate(270, 70)">
    <!-- Legs -->
    <rect x="14" y="220" width="22" height="80" rx="9" fill="#4A5568"/>
    <rect x="48" y="220" width="22" height="80" rx="9" fill="#4A5568"/>
    <!-- Shoes -->
    <ellipse cx="25" cy="300" rx="16" ry="7" fill="#2D3748"/>
    <ellipse cx="59" cy="300" rx="16" ry="7" fill="#2D3748"/>
    <!-- Body / Polo shirt -->
    <path d="M10 135 C10 118, 22 106, 42 102 C62 106, 74 118, 74 135 L78 228 C78 233, 68 236, 42 236 C16 236, 6 233, 6 228 Z" fill="#E56B6F"/>
    <!-- Collar -->
    <path d="M28 108 L42 120 L56 108" fill="none" stroke="#D15A5E" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Shirt text -->
    <text x="42" y="175" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="8" font-weight="bold" opacity="0.9">GUARDIAN</text>
    <text x="42" y="185" text-anchor="middle" fill="white" font-family="Arial, sans-serif" font-size="6.5" font-weight="600" letter-spacing="0.5" opacity="0.85">CLEANERS</text>
    <!-- Arms (crossed) -->
    <path d="M10 130 C-2 150, -2 175, 15 190 C25 196, 45 198, 65 190" fill="#E56B6F" stroke="#D15A5E" stroke-width="1"/>
    <path d="M74 130 C86 150, 86 175, 69 190 C59 196, 39 198, 19 190" fill="#E56B6F" stroke="#D15A5E" stroke-width="1"/>
    <!-- Hands at cross -->
    <circle cx="18" cy="192" r="8" fill="#C9956E"/>
    <circle cx="66" cy="192" r="8" fill="#C9956E"/>
    <!-- Neck -->
    <rect x="33" y="86" width="18" height="20" rx="7" fill="#C9956E"/>
    <!-- Head -->
    <ellipse cx="42" cy="62" rx="32" ry="34" fill="#C9956E"/>
    <!-- Hair (short, neat) -->
    <path d="M10 52 C8 28, 22 12, 42 10 C62 12, 76 28, 74 52 C74 38, 62 24, 42 22 C22 24, 10 38, 10 52Z" fill="#2D1F14"/>
    <!-- Short sides -->
    <path d="M10 52 C9 45, 10 38, 14 32 C12 40, 11 48, 12 52Z" fill="#231A10"/>
    <path d="M74 52 C75 45, 74 38, 70 32 C72 40, 73 48, 72 52Z" fill="#231A10"/>
    <!-- Eyes -->
    <circle cx="31" cy="60" r="3.5" fill="#2D3748"/>
    <circle cx="53" cy="60" r="3.5" fill="#2D3748"/>
    <circle cx="32" cy="59" r="1.3" fill="white"/>
    <circle cx="54" cy="59" r="1.3" fill="white"/>
    <!-- Eyebrows -->
    <path d="M24 52 C28 49, 34 49, 38 51" fill="none" stroke="#2D1F14" stroke-width="2" stroke-linecap="round"/>
    <path d="M46 51 C50 49, 56 49, 60 52" fill="none" stroke="#2D1F14" stroke-width="2" stroke-linecap="round"/>
    <!-- Confident smile -->
    <path d="M32 74 C36 81, 48 81, 52 74" fill="none" stroke="#A0634A" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="23" cy="72" rx="7" ry="3.5" fill="#E56B6F" opacity="0.15"/>
    <ellipse cx="61" cy="72" rx="7" ry="3.5" fill="#E56B6F" opacity="0.15"/>
  </g>

  <!-- ===== PERSON 3 (right, medium height, female) ===== -->
  <g transform="translate(400, 90)">
    <!-- Legs -->
    <rect x="14" y="200" width="20" height="75" rx="8" fill="#4A5568"/>
    <rect x="44" y="200" width="20" height="75" rx="8" fill="#4A5568"/>
    <!-- Shoes -->
    <ellipse cx="24" cy="275" rx="14" ry="6" fill="#2D3748"/>
    <ellipse cx="54" cy="275" rx="14" ry="6" fill="#2D3748"/>
    <!-- Body / Polo shirt -->
    <path d="M12 125 C12 108, 22 98, 39 95 C56 98, 66 108, 66 125 L69 208 C69 213, 62 216, 39 216 C16 216, 9 213, 9 208 Z" fill="#E56B6F"/>
    <!-- Collar -->
    <path d="M27 100 L39 112 L51 100" fill="none" stroke="#D15A5E" stroke-width="2" stroke-linecap="round"/>
    <!-- Left arm (holding mop) -->
    <path d="M12 120 C-2 135, -5 165, 5 180" fill="none" stroke="#E56B6F" stroke-width="18" stroke-linecap="round"/>
    <!-- Right arm (on hip) -->
    <path d="M66 120 C80 140, 82 165, 75 180" fill="none" stroke="#E56B6F" stroke-width="18" stroke-linecap="round"/>
    <!-- Hands -->
    <circle cx="5" cy="183" r="9" fill="#E8B898"/>
    <circle cx="75" cy="183" r="9" fill="#E8B898"/>
    <!-- Mop handle -->
    <line x1="3" y1="100" x2="-5" y2="280" stroke="#A0AEC0" stroke-width="4" stroke-linecap="round"/>
    <!-- Mop head -->
    <ellipse cx="-6" cy="278" rx="15" ry="8" fill="#CBD5E0"/>
    <path d="M-18 275 C-20 282, -15 288, -6 288 C3 288, 8 282, 6 275" fill="#A0AEC0" opacity="0.6"/>
    <!-- Neck -->
    <rect x="31" y="80" width="16" height="18" rx="6" fill="#E8B898"/>
    <!-- Head -->
    <ellipse cx="39" cy="58" rx="30" ry="32" fill="#E8B898"/>
    <!-- Hair (bob cut) -->
    <path d="M9 48 C7 22, 20 8, 39 6 C58 8, 71 22, 69 48 C69 32, 58 18, 39 16 C20 18, 9 32, 9 48Z" fill="#8B4513"/>
    <!-- Bob sides -->
    <path d="M9 48 C7 58, 8 72, 14 80 C10 70, 8 58, 9 48Z" fill="#7A3B10"/>
    <path d="M69 48 C71 58, 70 72, 64 80 C68 70, 70 58, 69 48Z" fill="#7A3B10"/>
    <!-- Eyes -->
    <circle cx="29" cy="56" r="3" fill="#2D3748"/>
    <circle cx="49" cy="56" r="3" fill="#2D3748"/>
    <circle cx="30" cy="55" r="1.2" fill="white"/>
    <circle cx="50" cy="55" r="1.2" fill="white"/>
    <!-- Eyelashes (subtle) -->
    <path d="M26 52 C27 50, 29 49, 31 50" fill="none" stroke="#2D3748" stroke-width="1" stroke-linecap="round"/>
    <path d="M46 50 C48 49, 50 50, 51 52" fill="none" stroke="#2D3748" stroke-width="1" stroke-linecap="round"/>
    <!-- Smile -->
    <path d="M31 68 C35 75, 43 75, 47 68" fill="none" stroke="#C05A5A" stroke-width="2" stroke-linecap="round"/>
    <!-- Blush -->
    <ellipse cx="22" cy="66" rx="6" ry="3" fill="#E56B6F" opacity="0.2"/>
    <ellipse cx="56" cy="66" rx="6" ry="3" fill="#E56B6F" opacity="0.2"/>
  </g>

  <!-- ===== SPARKLE DECORATIONS ===== -->
  <!-- Small sparkles around the team -->
  <g fill="#E56B6F" opacity="0.3">
    <path d="M100 80 L103 73 L106 80 L113 83 L106 86 L103 93 L100 86 L93 83 Z"/>
    <path d="M500 120 L502 115 L504 120 L509 122 L504 124 L502 129 L500 124 L495 122 Z"/>
    <path d="M530 70 L532 65 L534 70 L539 72 L534 74 L532 79 L530 74 L525 72 Z"/>
    <path d="M85 200 L87 196 L89 200 L93 202 L89 204 L87 208 L85 204 L81 202 Z"/>
  </g>

  <!-- Ground shadow -->
  <ellipse cx="300" cy="375" rx="220" ry="10" fill="#E56B6F" opacity="0.08"/>
</svg>